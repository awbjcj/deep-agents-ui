<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VSDA Deep Agent — UI Kit</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
  /* ── Fonts ── */
  @font-face { font-family:'Formular'; src:url('../../fonts/formular-ultra-trial.otf') format('opentype'); font-weight:900; }
  @font-face { font-family:'Formular'; src:url('../../fonts/formular-bold-trial.otf') format('opentype'); font-weight:700; }
  @font-face { font-family:'Formular'; src:url('../../fonts/formular-medium-trial.otf') format('opentype'); font-weight:500; }
  @font-face { font-family:'Formular'; src:url('../../fonts/formular-regular-trial.otf') format('opentype'); font-weight:400; }
  @font-face { font-family:'Formular'; src:url('../../fonts/formular-light-trial.otf') format('opentype'); font-weight:300; }
  @font-face { font-family:'Formular Mono'; src:url('../../fonts/formular-mono-trial.otf') format('opentype'); font-weight:400; }

  /* ── Reset ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body, #root { height:100%; }
  body { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  /* ── Animations ── */
  @keyframes fadeIn      { from{opacity:0}           to{opacity:1} }
  @keyframes fadeInUp    { from{opacity:0;transform:translateY(8px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes slideInLeft { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  @keyframes slideInRight{ from{opacity:0;transform:translateX(12px)}  to{opacity:1;transform:translateX(0)} }
  @keyframes loginEntry  { from{opacity:0;transform:scale(0.96) translateY(10px);filter:blur(4px)} to{opacity:1;transform:scale(1) translateY(0);filter:blur(0)} }
  @keyframes skeletonPulse{ 0%,100%{opacity:1} 50%{opacity:0.38} }
  @keyframes spin        { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* ── Scrollbars ── */
  * { scrollbar-width:thin; scrollbar-color:rgba(128,148,168,0.3) transparent; }
  *::-webkit-scrollbar { width:5px; height:5px; }
  *::-webkit-scrollbar-track { background:transparent; }
  *::-webkit-scrollbar-thumb { background:rgba(128,148,168,0.3); border-radius:9999px; }

  /* ── Placeholder ── */
  input::placeholder, textarea::placeholder { opacity:0.5; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/screens.jsx"></script>
<script type="text/babel" src="components/chat.jsx"></script>
<script type="text/babel" src="components/panels.jsx"></script>
<script type="text/babel" src="components/app.jsx"></script>
</body>
</html>
